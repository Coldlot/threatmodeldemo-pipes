name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  gitleaks:
    name: GitLeaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml

  build:
    name: Build IPA
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build unsigned IPA
        run: |
          xcodebuild build \
            -project ThreatModelDemo.xcodeproj \
            -scheme ThreatModelDemo \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./build

      - name: Create Payload and IPA
        run: |
          mkdir -p Payload
          cp -r ./build/Build/Products/Debug-iphonesimulator/ThreatModelDemo.app Payload/
          zip -r ThreatModelDemo.ipa Payload

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: threatmodeldemo-ipa
          path: ThreatModelDemo.ipa

  mobsf:
    name: MobSF Analysis
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: threatmodeldemo-ipa

      - name: Start MobSF and get API key
        run: |
          docker run -d -p 8888:8000 \
            -e MOBSF_DISABLE_AUTHENTICATION=1 \
            -e MOBSF_API_KEY=threatmodeldemo-ci-key \
            --name mobsf \
            opensecurity/mobile-security-framework-mobsf:latest
          echo "Waiting for MobSF to be ready..."
          until curl -s http://127.0.0.1:8888; do sleep 5; done
          echo "MobSF is ready!"
          echo "APIKEY=threatmodeldemo-ci-key" >> $GITHUB_ENV

      - name: Upload IPA to MobSF
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8888/api/v1/upload \
            -H "Authorization: threatmodeldemo-ci-key" \
            -F "file=@ThreatModelDemo.ipa")
          echo "Upload response: $RESPONSE"
          FILEHASH=$(echo "$RESPONSE" | grep -o '"hash": "[^"]*"' | cut -d'"' -f4)
          echo "FILEHASH=$FILEHASH" >> $GITHUB_ENV

      - name: Run MobSF scan
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8888/api/v1/scan \
            -H "Authorization: threatmodeldemo-ci-key" \
            -d "hash=$FILEHASH")
          echo "Scan response: $RESPONSE"

      - name: Wait for scan to complete and download report
        run: |
          echo "Waiting for scan to complete..."
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:8888/api/v1/scan_status?hash=$FILEHASH \
              -H "Authorization: threatmodeldemo-ci-key")
            echo "Scan status: $STATUS"
            if echo "$STATUS" | grep -q '"status":"completed"'; then
              echo "Scan completed!"
              break
            fi
            sleep 10
          done
          curl -X POST --url http://localhost:8888/api/v1/download_pdf \
            --data "hash=$FILEHASH" \
            -H "Authorization: threatmodeldemo-ci-key" \
            --output mobsf_report.pdf
          echo "Report downloaded, size: $(wc -c < mobsf_report.pdf) bytes"

      - name: Upload MobSF report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-report-pdf
          path: mobsf_report.pdf

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --config=p/swift \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --error \
            --sarif > semgrep.sarif

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep.sarif

      - name: Upload SARIF to GitHub Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  codeql:
    name: CodeQL Analysis
    runs-on: macos-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
      - name: Build Swift project
        run: |
          xcodebuild build \
            -project ThreatModelDemo.xcodeproj \
            -scheme ThreatModelDemo \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: codeql-results
      - name: Upload CodeQL SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results
          path: codeql-results